<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sin conexión - Almacén</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            color: #212529;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            max-width: 420px;
            background: white;
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        p {
            color: #555;
        }

        button {
            border: 0;
            background: #212529;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Sin conexión</h1>
    <p>No se pudo conectar con el sistema de almacén.</p>
    <p>Verifica tu conexión a internet e intenta nuevamente.</p>

    <button onclick="location.reload()">Reintentar</button>
</div>

</body>
</html>
